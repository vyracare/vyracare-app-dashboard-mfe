<section class="hero">
  <div class="hero-copy">
    <span class="kicker">Painel central</span>
    <vc-heading [level]="1">Visao geral da clinica</vc-heading>
    <vc-text [muted]="true">Acompanhe a rotina de atendimentos, cadastros e o pulso financeiro em um so lugar.</vc-text>
    <div class="hero-actions">
      <vc-button type="button" (click)="navigateTo('/cadastros/pacientes')">Novo paciente</vc-button>
      <vc-button type="button" variant="secondary" (click)="navigateTo('/agenda/novo')">Novo atendimento</vc-button>
    </div>
  </div>

  <div class="hero-metrics">
    <vc-card class="metric-card highlight">
      <span>Atendimentos hoje</span>
      <strong>18</strong>
      <small>+4 confirmados nas ultimas 2h</small>
    </vc-card>
    <vc-card class="metric-card">
      <span>Retornos pendentes</span>
      <strong>6</strong>
      <small>Agende nos proximos 3 dias</small>
    </vc-card>
    <vc-card class="metric-card soft">
      <span>Taxa de ocupacao</span>
      <strong>82%</strong>
      <small>Media semanal</small>
    </vc-card>
  </div>
</section>

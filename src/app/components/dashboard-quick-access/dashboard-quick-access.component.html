<section class="panel">
  <div class="panel-header">
    <div>
      <vc-heading [level]="2">Acesso rapido</vc-heading>
      <vc-text muted>Atalhos para criar novos cadastros e agilizar o fluxo da equipe.</vc-text>
    </div>
  </div>

  <div class="card-grid">
    <vc-card-button
      href="/cadastro/pacientes"
      badgeText="CP"
      title="Cadastro de pacientes"
      subtitle="Prontuarios e historico clinico"
    ></vc-card-button>
    <vc-card-button
      href="/cadastro/funcionarios"
      badgeText="PR"
      title="Cadastro de profissionais"
      subtitle="Equipe, especialidades e horarios"
    ></vc-card-button>
    <vc-card-button
      href="/cadastros/procedimentos"
      badgeText="PC"
      title="Cadastro de procedimentos"
      subtitle="Tabelas, precos e regras"
    ></vc-card-button>
    <vc-card-button
      href="/cadastros/convenios"
      badgeText="CV"
      title="Cadastro de convenios"
      subtitle="Contratos e autorizacoes"
    ></vc-card-button>
  </div>
</section>
